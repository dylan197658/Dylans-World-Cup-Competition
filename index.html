<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup Sweepstake Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen antialiased selection:bg-indigo-500/30">

    <div class="max-w-md mx-auto p-4 pb-12">
        <header class="text-center my-6">
            <div class="inline-flex items-center justify-center bg-indigo-600 text-white w-12 h-12 rounded-2xl shadow-lg shadow-indigo-500/20 mb-3">
                <i class="fa-solid font-black fa-trophy text-xl"></i>
            </div>
            <h1 class="text-2xl font-black tracking-tight bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">SWEEPSTAKE TRACKER</h1>
            <p class="text-xs text-slate-400 font-medium tracking-widest uppercase mt-1">Live Sheets Feed Dashboard</p>
        </header>

        <main class="space-y-4">
            <div class="bg-slate-800/50 backdrop-blur-xl border border-slate-700/50 rounded-3xl p-5 shadow-xl">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider flex items-center gap-2">
                        <i class="fa-solid fa-ranking-star text-indigo-400"></i> Standings
                    </h2>
                    <span id="loading-badge" class="text-[10px] bg-amber-500/10 text-amber-400 font-bold px-2 py-0.5 rounded-full border border-amber-500/20 animate-pulse">Syncing Sheets...</span>
                </div>
                
                <div id="leaderboard" class="space-y-2">
                    </div>
            </div>

            <div class="bg-slate-800/30 border border-slate-800 rounded-2xl p-4 text-xs text-slate-400 space-y-2">
                <p class="font-bold text-slate-300 uppercase tracking-wider text-[10px]">Scoring System</p>
                <div class="grid grid-cols-2 gap-2">
                    <div>Win: <span class="text-emerald-400 font-bold">+3</span> | Draw: <span class="text-amber-400 font-bold">+1</span> | Loss: <span class="text-rose-400 font-bold">-1</span></div>
                    <div>R32: <span class="text-slate-200">+5</span> | R16: <span class="text-slate-200">+6</span> | QF: <span class="text-slate-200">+7</span> | SF: <span class="text-slate-200">+8</span> | F: <span class="text-slate-200">+10</span></div>
                </div>
            </div>
        </main>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/70 backdrop-blur-md hidden flex items-center justify-center p-4 z-50 transition-opacity duration-300 opacity-0">
        <div class="bg-slate-800 border border-slate-700 w-full max-w-sm rounded-3xl p-6 shadow-2xl transform scale-95 transition-transform duration-300 flex flex-col max-h-[85vh]">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h3 id="modal-title" class="text-xl font-black text-white">Player</h3>
                    <p class="text-xs text-indigo-400 font-semibold uppercase tracking-wider mt-0.5">Score Breakdown</p>
                </div>
                <button onclick="closeModal()" class="text-slate-400 hover:text-white bg-slate-700/50 hover:bg-slate-700 w-8 h-8 rounded-full flex items-center justify-center transition-colors">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <div id="modal-content" class="space-y-4 overflow-y-auto pr-1 flex-1 text-sm text-slate-300">
                </div>
        </div>
    </div>

    <script>
        // Updated with your brand new Google Sheet ID and safe endpoint configuration
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/1H7FCeqLl0OQYF1m3u-kxOz77m00WJ6VF-GXLb0qFUgg/gviz/tq?tqx=out:csv';

        // Player assignments
        const players = [
            { name: "Brian", teams: ["France", "Brazil", "Croatia", "Turkey"] },
            { name: "Paula", teams: ["England", "Morocco", "Senegal", "Iran"] },
            { name: "Ella", teams: ["Portugal", "Belgium", "Columbia", "Uruguay"] },
            { name: "Dylan", teams: ["Spain", "Germany", "Mexico", "Japan"] },
            { name: "Josh", teams: ["Argentina", "Netherlands", "USA", "Switzerland"] }
        ];

        // Normalization maps to correct string variances between assignment arrays and fixtures
        const teamNameMap = {
            "türkiye": "Turkey", "turkey": "Turkey",
            "colombia": "Columbia", "columbia": "Columbia",
            "korea republic": "South Korea", "south korea": "South Korea",
            "ir iran": "Iran", "iran": "Iran",
            "dr congo": "Congo DR", "congo dr": "Congo DR"
        };

        function normalizeTeamName(name) {
            if (!name) return "";
            const clean = name.trim().toLowerCase();
            return teamNameMap[clean] || name.trim();
        }

        // Initialize baseline stats
        let teamStats = {};
        const allTrackedTeams = ["France", "Brazil", "Croatia", "Turkey", "England", "Morocco", "Senegal", "Iran", "Portugal", "Belgium", "Columbia", "Uruguay", "Spain", "Germany", "Mexico", "Japan", "Argentina", "Netherlands", "USA", "Switzerland"];
        
        function resetTeamStats() {
            allTrackedTeams.forEach(t => {
                teamStats[t] = { w: 0, d: 0, l: 0, r32: false, r16: false, qf: false, sf: false, f: false };
            });
        }

        // Safe CSV line splitter handling native strings with potential quotes
        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            return lines.map(line => {
                return line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/^"|"$/g, '').trim());
            });
        }

        // Main Fetch and Calculation Engine
        async function loadDataFromSheets() {
            try {
                resetTeamStats();
                const response = await fetch(SHEET_CSV_URL);
                const csvText = await response.text();
                const rows = parseCSV(csvText);

                // Process Wins, Draws, Losses
                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    if (row.length < 3 || !row[0] || !row[1] || !row[2]) continue;

                    const home = normalizeTeamName(row[0]);
                    const scoreRaw = row[1];
                    const away = normalizeTeamName(row[2]);

                    const isHomeTracked = allTrackedTeams.includes(home);
                    const isAwayTracked = allTrackedTeams.includes(away);

                    if (!isHomeTracked && !isAwayTracked) continue;

                    const scoreParts = scoreRaw.split('-');
                    if (scoreParts.length !== 2) continue;
                    
                    const homeScore = parseInt(scoreParts[0].trim());
                    const awayScore = parseInt(scoreParts[1].trim());

                    if (isNaN(homeScore) || isNaN(awayScore)) continue;

                    if (homeScore > awayScore) {
                        if (isHomeTracked) teamStats[home].w++;
                        if (isAwayTracked) teamStats[away].l++;
                    } else if (awayScore > homeScore) {
                        if (isHomeTracked) teamStats[home].l++;
                        if (isAwayTracked) teamStats[away].w++;
                    } else {
                        if (isHomeTracked) teamStats[home].d++;
                        if (isAwayTracked) teamStats[away].d++;
                    }
                }

                // Process Stage Advancement Bonuses (looking for text modifiers like '(R16)' inside score values)
                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    if (row.length < 3 || !row[1]) continue;
                    const home = normalizeTeamName(row[0]);
                    const away = normalizeTeamName(row[2]);
                    const scoreRaw = row[1].toUpperCase();

                    const matchAndApplyBonus = (stageFlag, property) => {
                        if (scoreRaw.includes(stageFlag)) {
                            if (allTrackedTeams.includes(home)) teamStats[home][property] = true;
                            if (allTrackedTeams.includes(away)) teamStats[away][property] = true;
                        }
                    };

                    matchAndApplyBonus('(R32)', 'r32');
                    matchAndApplyBonus('(R16)', 'r16');
                    matchAndApplyBonus('(QF)', 'qf');
                    matchAndApplyBonus('(SF)', 'sf');
                    matchAndApplyBonus('(F)', 'f');
                }

                // Update UI Status Badge
                document.getElementById('loading-badge').className = "text-[10px] bg-emerald-500/10 text-emerald-400 font-bold px-2 py-0.5 rounded-full border border-emerald-500/20";
                document.getElementById('loading-badge').innerText = "Synced";
                renderLeaderboard();

            } catch (error) {
                console.error("Error syncing Google Sheet data:", error);
                document.getElementById('loading-badge').className = "text-[10px] bg-rose-500/10 text-rose-400 font-bold px-2 py-0.5 rounded-full border border-rose-500/20";
                document.getElementById('loading-badge').innerText = "Sync Failed";
            }
        }

        function calculateTeamPoints(teamName) {
            const stats = teamStats[teamName];
            const matchPoints = (stats.w * 3) + (stats.d * 1) + (stats.l * -1);
            
            let bonusPoints = 0;
            if (stats.r32) bonusPoints += 5;
            if (stats.r16) bonusPoints += 6;
            if (stats.qf)  bonusPoints += 7;
            if (stats.sf)  bonusPoints += 8;
            if (stats.f)   bonusPoints += 10;

            return { total: matchPoints + bonusPoints, matchPoints, bonusPoints, stats };
        }

        function getPlayerData() {
            return players.map(player => {
                let totalScore = 0;
                let breakdown = [];

                player.teams.forEach(team => {
                    const data = calculateTeamPoints(team);
                    totalScore += data.total;
                    breakdown.push({ team, points: data.total, stats: data.stats });
                });

                return { name: player.name, totalScore, breakdown };
            }).sort((a, b) => b.totalScore - a.totalScore);
        }

        function renderLeaderboard() {
            const data = getPlayerData();
            const container = document.getElementById('leaderboard');
            container.innerHTML = '';

            data.forEach((player, index) => {
                let rankBadge = `<span class="text-xs font-bold text-slate-400 w-5">${index + 1}</span>`;
                if (index === 0) rankBadge = `<span class="flex items-center justify-center bg-amber-500 text-slate-950 rounded-full w-5 h-5 text-[10px] font-black shadow-amber-500/20">1</span>`;
                if (index === 1) rankBadge = `<span class="flex items-center justify-center bg-slate-300 text-slate-950 rounded-full w-5 h-5 text-[10px] font-black shadow-slate-300/20">2</span>`;
                if (index === 2) rankBadge = `<span class="flex items-center justify-center bg-amber-700 text-white rounded-full w-5 h-5 text-[10px] font-black shadow-amber-700/20">3</span>`;

                const row = document.createElement('button');
                row.className = "w-full text-left flex items-center justify-between p-3.5 rounded-2xl bg-slate-800/40 hover:bg-slate-700/40 border border-slate-700/30 transition active:scale-[0.99] touch-manipulation focus:outline-none";
                row.onclick = () => openModal(player);

                row.innerHTML = `
                    <div class="flex items-center gap-3">
                        ${rankBadge}
                        <div>
                            <div class="font-bold text-slate-100">${player.name}</div>
                            <div class="text-[11px] text-slate-400 font-medium">${player.breakdown.map(b => b.team).join(', ')}</div>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-lg font-black tracking-tight text-white">${player.totalScore}</span>
                        <i class="fa-solid fa-chevron-right text-[10px] text-slate-500"></i>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        function openModal(player) {
            document.getElementById('modal-title').innerText = player.name;
            const content = document.getElementById('modal-content');
            content.innerHTML = '';

            player.breakdown.forEach(b => {
                const teamCard = document.createElement('div');
                teamCard.className = "bg-slate-900/60 border border-slate-700/40 rounded-2xl p-3.5 space-y-2.5";
                
                let bonuses = [];
                if (b.stats.r32) bonuses.push('R32 (+5)');
                if (b.stats.r16) bonuses.push('R16 (+6)');
                if (b.stats.qf)  bonuses.push('QF (+7)');
                if (b.stats.sf)  bonuses.push('SF (+8)');
                if (b.stats.f)   bonuses.push('F (+10)');
                const bonusText = bonuses.length > 0 ? bonuses.join(', ') : 'None';

                teamCard.innerHTML = `
                    <div class="flex justify-between items-center border-b border-slate-800 pb-1.5">
                        <span class="font-bold text-white text-base">${b.team}</span>
                        <span class="bg-indigo-500/10 text-indigo-400 font-black text-xs px-2.5 py-1 rounded-full border border-indigo-500/20">${b.points} pts</span>
                    </div>
                    <div class="grid grid-cols-3 text-center gap-1 text-xs">
                        <div class="bg-emerald-500/5 border border-emerald-500/10 rounded-lg p-1.5"><div class="text-slate-400 text-[10px] uppercase font-bold">W</div><div class="text-emerald-400 font-bold text-sm">${b.stats.w}</div></div>
                        <div class="bg-amber-500/5 border border-amber-500/10 rounded-lg p-1.5"><div class="text-slate-400 text-[10px] uppercase font-bold">D</div><div class="text-amber-400 font-bold text-sm">${b.stats.d}</div></div>
                        <div class="bg-rose-500/5 border border-rose-500/10 rounded-lg p-1.5"><div class="text-slate-400 text-[10px] uppercase font-bold">L</div><div class="text-rose-400 font-bold text-sm">${b.stats.l}</div></div>
                    </div>
                    <div class="text-[11px] text-slate-400 pt-0.5">
                        <span class="font-bold text-slate-300">Stage Progression:</span> <span class="italic text-indigo-300">${bonusText}</span>
                    </div>
                `;
                content.appendChild(teamCard);
            });

            const modal = document.getElementById('modal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.querySelector('div').classList.remove('scale-95');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.add('opacity-0');
            modal.querySelector('div').classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        }

        window.onclick = function(e) { if (e.target == document.getElementById('modal')) closeModal(); }

        // Start engine
        loadDataFromSheets();
    </script>
</body>
</html>
