<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup Sweepstake Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen antialiased selection:bg-indigo-500/30">

    <div class="max-w-md mx-auto p-4 pb-12">
        <header class="text-center my-6">
            <div class="inline-flex items-center justify-center bg-indigo-600 text-white w-12 h-12 rounded-2xl shadow-lg shadow-indigo-500/20 mb-3">
                <i class="fa-solid font-black fa-trophy text-xl"></i>
            </div>
            <h1 class="text-2xl font-black tracking-tight bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">SWEEPSTAKE TRACKER</h1>
            <p class="text-xs text-slate-400 font-medium tracking-widest uppercase mt-1">Live Sheets Feed Dashboard</p>
        </header>

        <main class="space-y-4">
            <div class="bg-slate-800/50 backdrop-blur-xl border border-slate-700/50 rounded-3xl p-5 shadow-xl">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider flex items-center gap-2">
                        <i class="fa-solid fa-ranking-star text-indigo-400"></i> Standings
                    </h2>
                    <span id="loading-badge" class="text-[10px] bg-amber-500/10 text-amber-400 font-bold px-2 py-0.5 rounded-full border border-amber-500/20 animate-pulse">Syncing Sheets...</span>
                </div>
                
                <div id="leaderboard" class="space-y-2">
                    </div>
            </div>

            <div class="bg-slate-800/30 border border-slate-800 rounded-2xl p-4 text-xs text-slate-400 space-y-2">
                <p class="font-bold text-slate-300 uppercase tracking-wider text-[10px]">Scoring System</p>
                <div class="grid grid-cols-2 gap-2">
                    <div>Win: <span class="text-emerald-400 font-bold">+3</span> | Draw: <span class="text-amber-400 font-bold">+1</span> | Loss: <span class="text-rose-400 font-bold">-1</span></div>
                    <div>R32: <span class="text-slate-200">+5</span> | R16: <span class="text-slate-200">+6</span> | QF: <span class="text-slate-200">+7</span> | SF: <span class="text-slate-200">+8</span> | F: <span class="text-slate-200">+10</span></div>
                </div>
            </div>
        </main>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/70 backdrop-blur-md hidden flex items-center justify-center p-4 z-50 transition-opacity duration-300 opacity-0">
        <div class="bg-slate-800 border border-slate-700 w-full max-w-sm rounded-3xl p-6 shadow-2xl transform scale-95 transition-transform duration-300 flex flex-col max-h-[85vh]">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h3 id="modal-title" class="text-xl font-black text-white">Player</h3>
                    <p class="text-xs text-indigo-400 font-semibold uppercase tracking-wider mt-0.5">Score Breakdown</p>
                </div>
                <button onclick="closeModal()" class="text-slate-400 hover:text-white bg-slate-700/50 hover:bg-slate-700 w-8 h-8 rounded-full flex items-center justify-center transition-colors">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <div id="modal-content" class="space-y-4 overflow-y-auto pr-1 flex-1 text-sm text-slate-300">
                </div>
        </div>
    </div>

    <script>
        // Pointing directly to your specific Google Sheet (exported as CSV)
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS_g7F6Y8rD8f91vTf9w10-I7x-L_KbeDREeL3mY6qR9Yd8a_w9f8vT8eL1Z_c7B6Cw-A/pub?gid=0&output=csv';

        // Player assignments
        const players = [
            { name: "Brian", teams: ["France", "Brazil", "Croatia", "Turkey"] },
            { name: "Paula", teams: ["England", "Morocco", "Senegal", "Iran"] },
            { name: "Ella", teams: ["Portugal", "Belgium", "Columbia", "Uruguay"] },
            { name: "Dylan", teams: ["Spain", "Germany", "Mexico", "Japan"] },
            { name: "Josh", teams: ["Argentina", "Netherlands", "USA", "Switzerland"] }
        ];

        // Normalization map to catch spelling mismatches between the fixtures sheet and config
        const teamNameMap = {
            "türkiye": "Turkey", "turkey": "Turkey",
            "colombia": "Columbia", "columbia": "Columbia"
        };

        function normalizeTeamName(name) {
            if (!name) return "";
            const clean = name.trim().toLowerCase();
            return teamNameMap[clean] || name.trim();
        }

        // Initialize baseline stats
        let teamStats = {};
        const allTrackedTeams = ["France", "Brazil", "Croatia", "Turkey", "England", "Morocco", "Senegal", "Iran", "Portugal", "Belgium", "Columbia", "Uruguay", "Spain", "Germany", "Mexico", "Japan", "Argentina", "Netherlands", "USA", "Switzerland"];
        
        function resetTeamStats() {
            allTrackedTeams.forEach(t => {
                teamStats[t] = { w: 0, d: 0, l: 0, r32: false, r16: false, qf: false, sf: false, f: false };
            });
        }

        // CSV Parser
        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            return lines.map(line => {
                return line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/^"|"$/g, '').trim());
            });
        }

        // Main Fetch and Calculation Engine
        async function loadDataFromSheets() {
            try {
                resetTeamStats();
                const response = await fetch(SHEET_CSV_URL);
                const csvText = await response.text();
                const rows = parseCSV(csvText);

                // Process Wins, Draws, Losses
                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    if (row.length < 3 || !row[0] || !row[1] || !row[2]) continue;

                    const home = normalizeTeamName(row[0]);
                    const scoreRaw = row[1];
                    const away = normalizeTeamName(row[2]);

                    const isHomeTracked = allTrackedTeams.includes(home);
                    const isAwayTracked = allTrackedTeams.includes(away);

                    if (!isHomeTracked && !isAwayTracked) continue;

                    const scoreParts = scoreRaw.split('-');
                    if (scoreParts.length !== 2) continue;
                    
                    const homeScore = parseInt(scoreParts[0].trim());
                    const awayScore = parseInt(scoreParts[1].trim());

                    if (isNaN(homeScore) || isNaN(awayScore)) continue;

                    if (homeScore > awayScore) {
                        if (isHomeTracked) teamStats[home].w++;
                        if (isAwayTracked) teamStats[away].l++;
                    } else if (awayScore > homeScore) {
                        if (isHomeTracked) teamStats[home].l++;
                        if (isAwayTracked) teamStats[away].w++;
                    } else {
                        if (isHomeTracked) teamStats[home].d++;
                        if (isAwayTracked) teamStats[away].d++;
                    }
                }

                // Process Stage Advancement Bonuses
                // Appending flags directly inside the score column string handles points (e.g. "2-1 (R16)")
                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    if (row.length < 3 || !row[1]) continue;
                    const home = normalizeTeamName(row[0]);
                    const away = normalizeTeamName(row[2]);
                    const scoreRaw = row[1].toUpperCase();

                    const matchAndApplyBonus = (stageFlag, property) => {
                        if (scoreRaw.includes(stageFlag)) {
                            if (allTrackedTeams.includes(home))
