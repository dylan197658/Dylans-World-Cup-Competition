<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup Sweepstake Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen antialiased selection:bg-indigo-500/30">

    <div class="max-w-md mx-auto p-4 pb-12">
        <header class="text-center my-6">
            <div class="inline-flex items-center justify-center bg-indigo-600 text-white w-12 h-12 rounded-2xl shadow-lg shadow-indigo-500/20 mb-3">
                <i class="fa-solid font-black fa-trophy text-xl"></i>
            </div>
            <h1 class="text-2xl font-black tracking-tight bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">SWEEPSTAKE TRACKER</h1>
            <p class="text-xs text-slate-400 font-medium tracking-widest uppercase mt-1">World Cup Dashboard</p>
        </header>

        <main class="space-y-4">
            <div class="bg-slate-800/50 backdrop-blur-xl border border-slate-700/50 rounded-3xl p-5 shadow-xl">
                <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-ranking-star text-indigo-400"></i> Standings
                </h2>
                
                <div id="leaderboard" class="space-y-2">
                    </div>
            </div>

            <div class="bg-slate-800/30 border border-slate-800 rounded-2xl p-4 text-xs text-slate-400 space-y-2">
                <p class="font-bold text-slate-300 uppercase tracking-wider text-[10px]">Scoring System</p>
                <div class="grid grid-cols-2 gap-2">
                    <div>Win: <span class="text-emerald-400 font-bold">+3</span> | Draw: <span class="text-amber-400 font-bold">+1</span> | Loss: <span class="text-rose-400 font-bold">-1</span></div>
                    <div>R32: <span class="text-slate-200">+5</span> | R16: <span class="text-slate-200">+6</span> | QF: <span class="text-slate-200">+7</span> | SF: <span class="text-slate-200">+8</span> | F: <span class="text-slate-200">+10</span></div>
                </div>
            </div>
        </main>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/70 backdrop-blur-md hidden flex items-center justify-center p-4 z-50 transition-opacity duration-300 opacity-0">
        <div class="bg-slate-800 border border-slate-700 w-full max-w-sm rounded-3xl p-6 shadow-2xl transform scale-95 transition-transform duration-300 flex flex-col max-h-[85vh]">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h3 id="modal-title" class="text-xl font-black text-white">Player</h3>
                    <p class="text-xs text-indigo-400 font-semibold uppercase tracking-wider mt-0.5">Score Breakdown</p>
                </div>
                <button onclick="closeModal()" class="text-slate-400 hover:text-white bg-slate-700/50 hover:bg-slate-700 w-8 h-8 rounded-full flex items-center justify-center transition-colors">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <div id="modal-content" class="space-y-4 overflow-y-auto pr-1 flex-1 text-sm text-slate-300">
                </div>
        </div>
    </div>

    <script>
        // 1. DATA CONFIGURATION
        // Update these stats as the tournament progresses.
        const teamStats = {
            "France":      { w: 0, d: 0, l: 0, r32: false, r16: false, qf: false, sf: false, f: false },
            "Brazil":      { w: 0, d: 0, l: 0, r32: false, r16: false, qf: false, sf: false, f: false },
            "Croatia":     { w: 0, d: 0, l: 0, r32: false, r16: false, qf: false, sf: false, f: false },
            "Turkey":      { w: 0, d: 0, l: 0, r32: false, r16: false, qf: false, sf: false, f: false },
            "England":     { w: 0, d: 0, l: 0, r32: false, r16: false, qf: false, sf: false, f: false },
            "Morocco":     { w: 0, d: 0, l: 0, r32: false, r16: false, qf: false, sf: false, f: false },
            "Senegal":     { w: 0, d: 0, l: 0, r32: false, r16: false, qf: false, sf: false, f: false },
            "Iran":        { w: 0, d: 0, l: 0, r32: false, r16: false, qf: false, sf: false, f: false },
            "Portugal":    { w: 0, d: 0, l: 0, r32: false, r16: false, qf: false, sf: false, f: false },
            "Belgium":     { w: 0, d: 0, l: 0, r32: false, r16: false, qf: false, sf: false, f: false },
            "Columbia":    { w: 0, d: 0, l: 0, r32: false, r16: false, qf: false, sf: false, f: false },
            "Uruguay":     { w: 0, d: 0, l: 0, r32: false, r16: false, qf: false, sf: false, f: false },
            "Spain":       { w: 0, d: 0, l: 0, r32: false, r16: false, qf: false, sf: false, f: false },
            "Germany":     { w: 0, d: 0, l: 0, r32: false, r16: false, qf: false, sf: false, f: false },
            "Mexico":      { w: 0, d: 0, l: 0, r32: false, r16: false, qf: false, sf: false, f: false },
            "Japan":       { w: 0, d: 0, l: 0, r32: false, r16: false, qf: false, sf: false, f: false },
            "Argentina":   { w: 0, d: 0, l: 0, r32: false, r16: false, qf: false, sf: false, f: false },
            "Netherlands": { w: 0, d: 0, l: 0, r32: false, r16: false, qf: false, sf: false, f: false },
            "USA":         { w: 0, d: 0, l: 0, r32: false, r16: false, qf: false, sf: false, f: false },
            "Switzerland": { w: 0, d: 0, l: 0, r32: false, r16: false, qf: false, sf: false, f: false }
        };

        // Player assignments
        const players = [
            { name: "Brian", teams: ["France", "Brazil", "Croatia", "Turkey"] },
            { name: "Paula", teams: ["England", "Morocco", "Senegal", "Iran"] },
            { name: "Ella", teams: ["Portugal", "Belgium", "Columbia", "Uruguay"] },
            { name: "Dylan", teams: ["Spain", "Germany", "Mexico", "Japan"] },
            { name: "Josh", teams: ["Argentina", "Netherlands", "USA", "Switzerland"] }
        ];

        // 2. CALCULATION ENGINE
        function calculateTeamPoints(teamName) {
            const stats = teamStats[teamName];
            if (!stats) return { total: 0, matchPoints: 0, bonusPoints: 0, details: {} };

            const matchPoints = (stats.w * 3) + (stats.d * 1) + (stats.l * -1);
            
            let bonusPoints = 0;
            if (stats.r32) bonusPoints += 5;
            if (stats.r16) bonusPoints += 6;
            if (stats.qf)  bonusPoints += 7;
            if (stats.sf)  bonusPoints += 8;
            if (stats.f)   bonusPoints += 10;

            return {
                total: matchPoints + bonusPoints,
                matchPoints,
                bonusPoints,
                stats
            };
        }

        function getPlayerData() {
            return players.map(player => {
                let totalScore = 0;
                let breakdown = [];

                player.teams.forEach(team => {
                    const data = calculateTeamPoints(team);
                    totalScore += data.total;
                    breakdown.push({
                        team,
                        points: data.total,
                        stats: data.stats
                    });
                });

                return {
                    name: player.name,
                    totalScore,
                    breakdown
                };
            }).sort((a, b) => b.totalScore - a.totalScore);
        }

        // 3. UI RENDERING
        function renderLeaderboard() {
            const data = getPlayerData();
            const container = document.getElementById('leaderboard');
            container.innerHTML = '';

            data.forEach((player, index) => {
                // Style differences for podium finishes
                let rankBadge = `<span class="text-xs font-bold text-slate-400 w-5">${index + 1}</span>`;
                if (index === 0) rankBadge = `<span class="flex items-center justify-center bg-amber-500 text-slate-950 rounded-full w-5 h-5 text-[10px] font-black shadow-sm shadow-amber-500/20">1</span>`;
                if (index === 1) rankBadge = `<span class="flex items-center justify-center bg-slate-300 text-slate-950 rounded-full w-5 h-5 text-[10px] font-black shadow-sm shadow-slate-300/20">2</span>`;
                if (index === 2) rankBadge = `<span class="flex items-center justify-center bg-amber-700 text-white rounded-full w-5 h-5 text-[10px] font-black shadow-sm shadow-amber-700/20">3</span>`;

                const row = document.createElement('button');
                row.className = "w-full text-left flex items-center justify-between p-3.5 rounded-2xl bg-slate-800/40 hover:bg-slate-700/40 border border-slate-700/30 transition active:scale-[0.99] touch-manipulation focus:outline-none focus:ring-2 focus:ring-indigo-500/50";
                row.onclick = () => openModal(player);

                row.innerHTML = `
                    <div class="flex items-center gap-3">
                        ${rankBadge}
                        <div>
                            <div class="font-bold text-slate-100">${player.name}</div>
                            <div class="text-[11px] text-slate-400 font-medium">${player.breakdown.map(b => b.team).join(', ')}</div>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-lg font-black tracking-tight text-white">${player.totalScore}</span>
                        <i class="fa-solid fa-chevron-right text-[10px] text-slate-500"></i>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        // 4. MODAL MANAGEMENT
        function openModal(player) {
            document.getElementById('modal-title').innerText = player.name;
            const content = document.getElementById('modal-content');
            content.innerHTML = '';

            player.breakdown.forEach(b => {
                const teamCard = document.createElement('div');
                teamCard.className = "bg-slate-900/60 border border-slate-700/40 rounded-2xl p-3.5 space-y-2.5";
                
                // Construct bonus string
                let bonuses = [];
                if (b.stats.r32) bonuses.push('R32 (+5)');
                if (b.stats.r16) bonuses.push('R16 (+6)');
                if (b.stats.qf)  bonuses.push('QF (+7)');
                if (b.stats.sf)  bonuses.push('SF (+8)');
                if (b.stats.f)   bonuses.push('F (+10)');
                const bonusText = bonuses.length > 0 ? bonuses.join(', ') : 'None';

                teamCard.innerHTML = `
                    <div class="flex justify-between items-center border-b border-slate-800 pb-1.5">
                        <span class="font-bold text-white text-base">${b.team}</span>
                        <span class="bg-indigo-500/10 text-indigo-400 font-black text-xs px-2.5 py-1 rounded-full border border-indigo-500/20">${b.points} pts</span>
                    </div>
                    <div class="grid grid-cols-3 text-center gap-1 text-xs">
                        <div class="bg-emerald-500/5 border border-emerald-500/10 rounded-lg p-1.5"><div class="text-slate-400 text-[10px] uppercase font-bold">W</div><div class="text-emerald-400 font-bold text-sm">${b.stats.w}</div></div>
                        <div class="bg-amber-500/5 border border-amber-500/10 rounded-lg p-1.5"><div class="text-slate-400 text-[10px] uppercase font-bold">D</div><div class="text-amber-400 font-bold text-sm">${b.stats.d}</div></div>
                        <div class="bg-rose-500/5 border border-rose-500/10 rounded-lg p-1.5"><div class="text-slate-400 text-[10px] uppercase font-bold">L</div><div class="text-rose-400 font-bold text-sm">${b.stats.l}</div></div>
                    </div>
                    <div class="text-[11px] text-slate-400 pt-0.5">
                        <span class="font-bold text-slate-300">Stage Progression:</span> <span class="italic text-indigo-300">${bonusText}</span>
                    </div>
                `;
                content.appendChild(teamCard);
            });

            const modal = document.getElementById('modal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.querySelector('div').classList.remove('scale-95');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.add('opacity-0');
            modal.querySelector('div').classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        // Close modal on background click
        window.onclick = function(event) {
            const modal = document.getElementById('modal');
            if (event.target == modal) {
                closeModal();
            }
        }

        // Initial launch
        renderLeaderboard();
    </script>
</body>
</html>
